<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTEN Time Clock</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      text-align: center;
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .clock {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 24px;
      font-weight: bold;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tab-btn {
      border: none;
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #dbe5f5;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #2563eb;
      color: #fff;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .employee-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .employee-btn {
      border: none;
      border-radius: 14px;
      padding: 22px 12px;
      font-size: 1.2rem;
      font-weight: bold;
      background: #e9eef7;
      cursor: pointer;
      transition: 0.2s;
    }

    .employee-btn:hover {
      background: #dbe5f5;
    }

    .employee-btn.selected {
      background: #2563eb;
      color: #fff;
    }

    .selected-name {
      font-size: 1.5rem;
      text-align: center;
      font-weight: bold;
      min-height: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 24px 12px;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
    }

    .clock-in { background: #16a34a; }
    .clock-out { background: #dc2626; }

    .message {
      text-align: center;
      font-size: 1.1rem;
      min-height: 1.5em;
      font-weight: bold;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }

    .date-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .date-input {
      padding: 12px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .reload-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    .status-table-wrap {
      overflow-x: auto;
    }

    .status-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    .status-table th,
    .status-table td {
      border-bottom: 1px solid #ddd;
      padding: 12px 10px;
      text-align: center;
    }

    .status-table th {
      background: #f1f5f9;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .status-mis {
      background: #e5e7eb;
    }

    .status-working {
      background: #dcfce7;
      color: #166534;
    }

    .status-done {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-check {
      background: #fee2e2;
      color: #b91c1c;
    }

    @media (max-width: 700px) {
      .employee-grid { grid-template-columns: 1fr; }
      .action-buttons { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LISTEN Time Clock</h1>
    <div class="clock" id="clock"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tabClockBtn">打刻</button>
      <button class="tab-btn" id="tabStatusBtn">一覧</button>
    </div>

    <div id="clockView">
      <div class="card">
        <div class="section-title">従業員を選択してください</div>
        <div class="employee-grid" id="employeeList"></div>
      </div>

      <div class="card">
        <div class="section-title">選択中</div>
        <div class="selected-name" id="selectedName">未選択</div>
      </div>

      <div class="card">
        <div class="action-buttons">
          <button class="action-btn clock-in" id="clockInBtn">出勤</button>
          <button class="action-btn clock-out" id="clockOutBtn">退勤</button>
        </div>
      </div>

      <div class="card">
        <div class="message" id="message"></div>
      </div>
    </div>

    <div id="statusView" class="hidden">
      <div class="card">
        <div class="section-title">全員の出退勤状況</div>

        <div class="date-row">
          <label for="statusDate">日付</label>
          <input type="date" id="statusDate" class="date-input">
          <button id="loadStatusBtn" class="reload-btn">表示</button>
        </div>

        <div class="message" id="statusMessage"></div>

        <div class="status-table-wrap">
          <table class="status-table">
            <thead>
              <tr>
                <th>氏名</th>
                <th>出勤</th>
                <th>退勤</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="statusTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let employees = [];
    let selectedEmployee = "";
    let lastClock = {
      employeeId: "",
      actionType: "",
      timestamp: 0
    };

    const employeeList = document.getElementById("employeeList");
    const selectedName = document.getElementById("selectedName");
    const message = document.getElementById("message");
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");

    const tabClockBtn = document.getElementById("tabClockBtn");
    const tabStatusBtn = document.getElementById("tabStatusBtn");
    const clockView = document.getElementById("clockView");
    const statusView = document.getElementById("statusView");

    const statusDate = document.getElementById("statusDate");
    const loadStatusBtn = document.getElementById("loadStatusBtn");
    const statusMessage = document.getElementById("statusMessage");
    const statusTableBody = document.getElementById("statusTableBody");

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleString("ja-JP");
    }

    function formatDateForApi(dateValue) {
      return dateValue.replaceAll("-", "/");
    }

    function getTodayForInput() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function setActiveTab(mode) {
      if (mode === "clock") {
        tabClockBtn.classList.add("active");
        tabStatusBtn.classList.remove("active");
        clockView.classList.remove("hidden");
        statusView.classList.add("hidden");
      } else {
        tabClockBtn.classList.remove("active");
        tabStatusBtn.classList.add("active");
        clockView.classList.add("hidden");
        statusView.classList.remove("hidden");
      }
    }

    function renderEmployees() {
      employeeList.innerHTML = "";

      if (!employees.length) {
        employeeList.innerHTML = "<div>従業員がいません</div>";
        return;
      }

      employees.forEach((employee) => {
        const button = document.createElement("button");
        button.className = "employee-btn";
        button.textContent = employee.name;

        if (selectedEmployee && selectedEmployee.employee_id === employee.employee_id) {
          button.classList.add("selected");
        }

        button.addEventListener("click", () => {
          selectedEmployee = employee;
          selectedName.textContent = employee.name;
          message.textContent = "";
          renderEmployees();
        });

        employeeList.appendChild(button);
      });
    }

    async function loadEmployees() {
      try {
        message.textContent = "従業員一覧を読み込み中...";
        const response = await fetch(`${CONFIG.GAS_URL}?action=getEmployees`);
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "従業員一覧の取得に失敗しました");
        }

        employees = data.employees || [];
        renderEmployees();
        message.textContent = "";
      } catch (error) {
        console.error(error);
        message.textContent = "従業員一覧の取得に失敗しました";
      }
    }

    function getStatusBadge(status) {
      if (status === "未出勤") {
        return '<span class="status-badge status-mis">未出勤</span>';
      }
      if (status === "勤務中") {
        return '<span class="status-badge status-working">勤務中</span>';
      }
      if (status === "退勤済") {
        return '<span class="status-badge status-done">退勤済</span>';
      }
      if (status === "要確認") {
        return '<span class="status-badge status-check">要確認</span>';
      }
      return status;
    }

    function renderStatusTable(statuses) {
      statusTableBody.innerHTML = "";

      if (!statuses.length) {
        statusTableBody.innerHTML = '<tr><td colspan="4">データがありません</td></tr>';
        return;
      }

      statuses.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.name || ""}</td>
          <td>${item.clockIn || ""}</td>
          <td>${item.clockOut || ""}</td>
          <td>${getStatusBadge(item.status)}</td>
        `;
        statusTableBody.appendChild(tr);
      });
    }

    async function loadDailyStatus() {
      try {
        statusMessage.textContent = "一覧を読み込み中...";
        const dateValue = statusDate.value;
        const apiDate = formatDateForApi(dateValue);

        const response = await fetch(`${CONFIG.GAS_URL}?action=getDailyStatus&date=${encodeURIComponent(apiDate)}`);
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "一覧の取得に失敗しました");
        }

        renderStatusTable(data.statuses || []);
        statusMessage.textContent = "";
      } catch (error) {
        console.error(error);
        statusMessage.textContent = "一覧の取得に失敗しました";
      }
    }

    async function saveClock(actionType) {
      if (!selectedEmployee) {
        message.textContent = "従業員を選択してください";
        return;
      }

      const now = Date.now();
      const isSameEmployee = lastClock.employeeId === selectedEmployee.employee_id;
      const isSameAction = lastClock.actionType === actionType;
      const isWithin10Seconds = now - lastClock.timestamp < 10000;

      if (isSameEmployee && isSameAction && isWithin10Seconds) {
        const ok = confirm(`${selectedEmployee.name} さんの${actionType}が直前にも記録されています。もう一度記録しますか？`);
        if (!ok) {
          return;
        }
      }

      try {
        message.textContent = "保存中...";
        const response = await fetch(CONFIG.GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "clock",
            name: selectedEmployee.name,
            employee_id: selectedEmployee.employee_id,
            actionType: actionType
          })
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "保存に失敗しました");
        }

        message.textContent = data.message;

        lastClock = {
          employeeId: selectedEmployee.employee_id,
          actionType: actionType,
          timestamp: now
        };

        selectedEmployee = "";
        selectedName.textContent = "未選択";
        renderEmployees();

        setTimeout(() => {
          message.textContent = "";
        }, 3000);

      } catch (error) {
        console.error(error);
        message.textContent = "保存に失敗しました";
      }
    }

    tabClockBtn.addEventListener("click", () => {
      setActiveTab("clock");
    });

    tabStatusBtn.addEventListener("click", () => {
      setActiveTab("status");
      loadDailyStatus();
    });

    loadStatusBtn.addEventListener("click", () => {
      loadDailyStatus();
    });

    clockInBtn.addEventListener("click", () => saveClock("出勤"));
    clockOutBtn.addEventListener("click", () => saveClock("退勤"));

    updateClock();
    setInterval(updateClock, 1000);

    statusDate.value = getTodayForInput();

    loadEmployees();
    loadDailyStatus();
  </script>
</body>
</html>
