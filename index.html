<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTEN Time Clock</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f7fb;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .clock {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ddd;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .employee-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
    }

    .employee-btn {
      padding: 20px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      background: #eee;
    }

    .selected {
      background: #2563eb;
      color: white;
    }

    .action-btn {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      color: white;
    }

    .clock-in { background: green; }
    .clock-out { background: red; }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>LISTEN Time Clock</h1>

    <div id="clock" class="clock"></div>

    <div class="tabs">
      <button id="tabClockBtn" class="tab-btn active">打刻</button>
      <button id="tabStatusBtn" class="tab-btn">一覧</button>
    </div>

    <!-- 打刻 -->
    <div id="clockView">
      <div class="card">
        <div id="employeeList" class="employee-grid"></div>
      </div>

      <div class="card">
        <div id="selectedName">未選択</div>
      </div>

      <div class="card">
        <button id="clockInBtn" class="action-btn clock-in">出勤</button>
        <button id="clockOutBtn" class="action-btn clock-out">退勤</button>
      </div>

      <div class="card">
        <div id="message"></div>
      </div>
    </div>

    <!-- 一覧 -->
    <div id="statusView" class="hidden">
      <div class="card">

        <input type="date" id="statusDate">
        <button id="loadStatusBtn">表示</button>
        <button id="exportCsvBtn">CSV</button>

        <div id="statusMessage"></div>

        <table>
          <thead>
            <tr>
              <th>氏名</th>
              <th>出勤</th>
              <th>退勤</th>
              <th>状態</th>
            </tr>
          </thead>
          <tbody id="statusTableBody"></tbody>
        </table>

      </div>
    </div>
  </div>

  <!-- 🔥 順番重要 -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
